name: GSC Index Check

on:
  workflow_call:
    inputs:
      config_path:
        description: 'Path to config.yml in the calling repo'
        required: false
        default: './config.yml'
        type: string
    secrets:
      GSC_CREDENTIALS_JSON:
        required: true
      TELEGRAM_BOT_TOKEN:
        required: false
      TELEGRAM_CHAT_ID:
        required: false

  workflow_dispatch:

permissions:
  contents: read

jobs:
  gsc-index-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout calling repository
        uses: actions/checkout@v4

      - name: Checkout engine
        uses: actions/checkout@v4
        with:
          repository: cybrixcc/leadhunter-engine
          path: .engine
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: .engine/package.json

      - name: Install engine dependencies
        run: npm ci --prefix .engine

      - name: Load config and set env vars
        run: |
          CONFIG="${{ inputs.config_path || './config.yml' }}"
          if [ -f "$CONFIG" ]; then
            SITE_NAME=$(grep '^site_name:' "$CONFIG" | sed 's/site_name:\s*//' | tr -d '"' | tr -d "'")
            SITE_URL=$(grep '^site_url:' "$CONFIG" | sed 's/site_url:\s*//' | tr -d '"' | tr -d "'")
            echo "SITE_NAME=${SITE_NAME}" >> $GITHUB_ENV
            echo "SITE_URL=${SITE_URL}" >> $GITHUB_ENV
            echo "SITE_LABEL=${SITE_NAME}" >> $GITHUB_ENV
          fi

      - name: Copy engine scripts
        run: cp -r .engine/scripts ./scripts

      - name: Build site (generates sitemap)
        run: |
          if [ -f package.json ] && grep -q '"build"' package.json; then
            npm ci && npm run build
          else
            echo "No build step found — skipping"
          fi

      - name: Run GSC Index Check
        env:
          GSC_CREDENTIALS_JSON: ${{ secrets.GSC_CREDENTIALS_JSON }}
        run: node scripts/gsc-index-check.mjs

      - name: Send Telegram Notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          chmod +x scripts/send-telegram-notification.sh
          ./scripts/send-telegram-notification.sh gsc-index-check
