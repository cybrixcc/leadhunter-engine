name: GSC Keyword Performance

on:
  workflow_call:
    inputs:
      config_path:
        description: 'Path to config.yml in the calling repo'
        required: false
        default: './config.yml'
        type: string
    secrets:
      GSC_CREDENTIALS_JSON:
        required: true
      UMAMI_API_KEY:
        required: false
      UMAMI_WEBSITE_ID:
        required: false
      TELEGRAM_BOT_TOKEN:
        required: false
      TELEGRAM_CHAT_ID:
        required: false

  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  keyword-performance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout calling repository
        uses: actions/checkout@v4

      - name: Checkout engine
        uses: actions/checkout@v4
        with:
          repository: cybrixcc/leadhunter-engine
          path: .engine
          ref: master
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: .engine/package.json

      - name: Install engine dependencies
        run: npm ci --prefix .engine

      - name: Load config and set env vars
        run: |
          CONFIG="${{ inputs.config_path || './config.yml' }}"
          if [ -f "$CONFIG" ]; then
            SITE_NAME=$(grep '^site_name:' "$CONFIG" | sed 's/site_name:\s*//' | tr -d '"' | tr -d "'")
            SITE_URL=$(grep '^site_url:' "$CONFIG" | sed 's/site_url:\s*//' | tr -d '"' | tr -d "'")
            echo "SITE_NAME=${SITE_NAME}" >> $GITHUB_ENV
            echo "SITE_URL=${SITE_URL}" >> $GITHUB_ENV
            echo "SITE_LABEL=${SITE_NAME}" >> $GITHUB_ENV
          fi

      - name: Copy engine scripts
        run: cp -r .engine/scripts ./scripts

      - name: Run GSC Keyword Performance
        id: report
        env:
          GSC_CREDENTIALS_JSON: ${{ secrets.GSC_CREDENTIALS_JSON }}
          UMAMI_API_KEY: ${{ secrets.UMAMI_API_KEY }}
          UMAMI_WEBSITE_ID: ${{ secrets.UMAMI_WEBSITE_ID }}
        run: |
          node scripts/gsc-keyword-performance.mjs | tee report_output.txt

          # Extract outputs from the script
          for KEY in total_keywords total_clicks clicks_delta total_impressions impressions_delta avg_position avg_ctr rising_count declining_count strike_distance_count new_keywords_count top_keyword top_keyword_position top_keyword_clicks; do
            VALUE=$(grep "::set-output name=${KEY}::" report_output.txt | sed "s/.*:://")
            echo "${KEY}=${VALUE:-0}" >> $GITHUB_OUTPUT
          done

      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gsc-keywords-${{ github.run_number }}
          path: |
            /tmp/gsc-keyword-results.json
            /tmp/gsc-keyword-report.md
          retention-days: 90
          if-no-files-found: ignore

      - name: Create or Update GitHub Issue
        id: issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const date = new Date().toISOString().split('T')[0];
            const runUrl = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';

            let mdReport = '';
            try {
              mdReport = fs.readFileSync('/tmp/gsc-keyword-report.md', 'utf8');
            } catch (e) {
              mdReport = `> ⚠️ Report file not found — the script likely failed. [Check logs](${runUrl}).`;
            }

            const issueTitle = `GSC Weekly Keywords: ${date}`;
            const issueBody = [
              `> Auto-generated by [GSC Keyword Performance workflow](${runUrl}) on ${date}`,
              '',
              mdReport,
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'gsc-keywords',
              state: 'open',
              per_page: 1,
            });

            let issueUrl = '';
            if (existing.data.length > 0) {
              const issueNumber = existing.data[0].number;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: '## Weekly Update — ' + date + '\n\n' + mdReport,
              });
              issueUrl = existing.data[0].html_url;
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: issueBody,
                labels: ['gsc-keywords', 'automation'],
              });
              issueUrl = created.data.html_url;
            }
            core.setOutput('issue_url', issueUrl);

      - name: Send Telegram Notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GSC_ISSUE_URL: ${{ steps.issue.outputs.issue_url }}
        run: |
          chmod +x scripts/send-telegram-notification.sh
          ./scripts/send-telegram-notification.sh gsc-keyword-performance
